const { useState, useEffect } = React;

// ── Assessores iniciais (carregados no Firebase na primeira vez) ───────────────
const ASSESSORES_INICIAIS = [
  { codigo: "admin",  senha: "admin123",  nome: "Administrador"           },
  { codigo: "45966",  senha: "senha456",  nome: "Felipe Ribeiro"          },
  { codigo: "41812",  senha: "123456789", nome: "Katryne Ludvichak Maciel" },
];

// ── helpers localStorage (para dados de ofertas/clientes por assessor) ────────
const lsKey = (assessor, tipo) => `campanha_${assessor}_${tipo}`;
const lsGet = (key, fallback)  => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e){ return fallback; } };
const lsSet = (key, val)       => { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} };
const lsDel = (key)            => { try { localStorage.removeItem(key); } catch(e){} };

// ── Tela Gerenciar Assessores — Firebase ─────────────────────────────────────
function GerenciarAssessores({ assessores, setAssessores, onVoltar }) {
  const [form, setForm]         = useState({ codigo:"", nome:"", senha:"", confirmar:"" });
  const [editando, setEditando] = useState(null);
  const [erro, setErro]         = useState("");
  const [sucesso, setSucesso]   = useState("");
  const [salvando, setSalvando] = useState(false);
  const [showSenha, setShowSenha] = useState(false);

  const limpar = () => { setForm({ codigo:"", nome:"", senha:"", confirmar:"" }); setEditando(null); setErro(""); };

  const salvar = async () => {
    setErro(""); setSucesso("");
    if (!form.codigo.trim() || !form.nome.trim() || !form.senha.trim()) { setErro("Preencha código, nome e senha."); return; }
    if (form.senha !== form.confirmar) { setErro("As senhas não coincidem."); return; }
    if (!editando && assessores.find(a => a.codigo === form.codigo.trim())) { setErro("Este código já está cadastrado."); return; }

    setSalvando(true);
    try {
      const dados = { codigo: form.codigo.trim(), nome: form.nome.trim(), senha: form.senha };
      await db.collection("assessores").doc(dados.codigo).set(dados);
      const nova = editando
        ? assessores.map(a => a.codigo === editando ? dados : a)
        : [...assessores, dados];
      setAssessores(nova);
      setSucesso(editando ? `${form.nome} atualizado com sucesso!` : `${form.nome} cadastrado com sucesso!`);
      limpar();
    } catch(e) {
      setErro("Erro ao salvar. Verifique sua conexão.");
    }
    setSalvando(false);
  };

  const excluir = async (codigo) => {
    if (codigo === "admin") { setErro("O administrador não pode ser removido."); return; }
    if (!window.confirm(`Excluir o assessor ${codigo}?`)) return;
    setSalvando(true);
    try {
      await db.collection("assessores").doc(codigo).delete();
      setAssessores(assessores.filter(a => a.codigo !== codigo));
      setSucesso("Assessor removido.");
    } catch(e) { setErro("Erro ao excluir."); }
    setSalvando(false);
  };

  const iniciarEdicao = (a) => {
    setEditando(a.codigo);
    setForm({ codigo: a.codigo, nome: a.nome, senha: a.senha, confirmar: a.senha });
    setErro(""); setSucesso("");
  };

  return (
    <div style={{minHeight:"100vh",background:"#f8fafc",fontFamily:"'Lato','Segoe UI',sans-serif"}}>
      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 32px"}}>
        <div style={{maxWidth:900,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:62}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,background:"#0f172a",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{color:"#fff",fontSize:17}}>🎯</span>
            </div>
            <div>
              <div style={{fontSize:16,fontWeight:800,color:"#0f172a"}}>Campanha do Mês</div>
              <div style={{fontSize:11,color:"#94a3b8"}}>Gerenciamento de Assessores</div>
            </div>
          </div>
          <button onClick={onVoltar} style={{background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 18px",fontSize:13,fontWeight:700,color:"#374151",cursor:"pointer"}}>
            ← Voltar ao Dashboard
          </button>
        </div>
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:"30px 32px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24,alignItems:"start"}}>

          {/* Formulário */}
          <div style={{background:"#fff",borderRadius:20,padding:"28px",border:"1px solid #f0f0f0",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
            <h2 style={{fontSize:17,fontWeight:800,color:"#0f172a",margin:"0 0 20px"}}>
              {editando ? "✏️ Editar Assessor" : "➕ Novo Assessor"}
            </h2>

            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:5}}>Código do Assessor</label>
              <input type="text" placeholder="Ex: 69570" value={form.codigo} disabled={!!editando}
                onChange={e=>setForm({...form,codigo:e.target.value})}
                style={{width:"100%",padding:"10px 13px",border:"1px solid #e2e8f0",borderRadius:10,fontSize:14,boxSizing:"border-box",outline:"none",background:editando?"#f8fafc":"#fff",color:editando?"#94a3b8":"#0f172a"}}/>
              {editando && <div style={{fontSize:11,color:"#94a3b8",marginTop:3}}>O código não pode ser alterado</div>}
            </div>

            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:5}}>Nome completo</label>
              <input type="text" placeholder="Ex: João Pereira" value={form.nome}
                onChange={e=>setForm({...form,nome:e.target.value})}
                style={{width:"100%",padding:"10px 13px",border:"1px solid #e2e8f0",borderRadius:10,fontSize:14,boxSizing:"border-box",outline:"none"}}/>
            </div>

            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:5}}>Senha</label>
              <div style={{position:"relative"}}>
                <input type={showSenha?"text":"password"} placeholder="Crie uma senha" value={form.senha}
                  onChange={e=>setForm({...form,senha:e.target.value})}
                  style={{width:"100%",padding:"10px 44px 10px 13px",border:"1px solid #e2e8f0",borderRadius:10,fontSize:14,boxSizing:"border-box",outline:"none"}}/>
                <button onClick={()=>setShowSenha(!showSenha)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:15,color:"#94a3b8",padding:0}}>
                  {showSenha?"🙈":"👁"}
                </button>
              </div>
            </div>

            <div style={{marginBottom:20}}>
              <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:5}}>Confirmar senha</label>
              <input type={showSenha?"text":"password"} placeholder="Repita a senha" value={form.confirmar}
                onChange={e=>setForm({...form,confirmar:e.target.value})}
                style={{width:"100%",padding:"10px 13px",border:`1px solid ${form.confirmar&&form.confirmar!==form.senha?"#fca5a5":"#e2e8f0"}`,borderRadius:10,fontSize:14,boxSizing:"border-box",outline:"none"}}/>
              {form.confirmar && form.confirmar!==form.senha && <div style={{fontSize:11,color:"#dc2626",marginTop:3}}>As senhas não coincidem</div>}
            </div>

            {erro    && <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#dc2626",fontWeight:600}}>⚠️ {erro}</div>}
            {sucesso && <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#16a34a",fontWeight:600}}>✅ {sucesso}</div>}

            <div style={{display:"flex",gap:10}}>
              <button onClick={salvar} disabled={salvando}
                style={{flex:1,padding:"11px",borderRadius:10,border:"none",background:salvando?"#94a3b8":"#0f172a",color:"#fff",fontSize:14,fontWeight:700,cursor:salvando?"not-allowed":"pointer"}}>
                {salvando ? "Salvando..." : editando ? "Salvar alterações" : "Cadastrar assessor"}
              </button>
              {editando && (
                <button onClick={limpar} style={{padding:"11px 16px",borderRadius:10,border:"1px solid #e2e8f0",background:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",color:"#64748b"}}>
                  Cancelar
                </button>
              )}
            </div>
          </div>

          {/* Lista */}
          <div style={{background:"#fff",borderRadius:20,border:"1px solid #f0f0f0",boxShadow:"0 1px 4px rgba(0,0,0,0.05)",overflow:"hidden"}}>
            <div style={{padding:"20px 24px",borderBottom:"1px solid #f0f0f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <h2 style={{fontSize:17,fontWeight:800,color:"#0f172a",margin:0}}>👥 Assessores cadastrados</h2>
              <span style={{background:"#eff6ff",color:"#2563eb",padding:"4px 12px",borderRadius:20,fontSize:12,fontWeight:700}}>{assessores.length}</span>
            </div>
            <div style={{maxHeight:480,overflowY:"auto"}}>
              {assessores.map((a,i)=>(
                <div key={a.codigo} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 24px",borderBottom:i<assessores.length-1?"1px solid #f8fafc":"none"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#fafbfc"}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:38,height:38,borderRadius:10,background:a.codigo==="admin"?"#0f172a":"#eff6ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>
                      {a.codigo==="admin"?"🔑":"👤"}
                    </div>
                    <div>
                      <div style={{fontWeight:700,fontSize:14,color:"#0f172a"}}>{a.nome}</div>
                      <div style={{fontSize:12,color:"#94a3b8"}}>Código: {a.codigo}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>iniciarEdicao(a)} style={{background:"#f1f5f9",border:"none",borderRadius:7,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",color:"#374151"}}>✏️ Editar</button>
                    {a.codigo!=="admin" && (
                      <button onClick={()=>excluir(a.codigo)} style={{background:"#fef2f2",border:"none",borderRadius:7,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",color:"#dc2626"}}>🗑</button>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Tela de Login ─────────────────────────────────────────────────────────────
function Login({ onLogin, assessores }) {
  const [codigo, setCodigo]   = useState("");
  const [senha, setSenha]     = useState("");
  const [erro, setErro]       = useState("");
  const [showSenha, setShowSenha] = useState(false);

  const entrar = () => {
    const assessor = assessores.find(a => a.codigo === codigo.trim() && a.senha === senha);
    if (assessor) { setErro(""); onLogin(assessor); }
    else setErro("Código ou senha incorretos. Tente novamente.");
  };

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Lato','Segoe UI',sans-serif"}}>
      <div style={{background:"#fff",borderRadius:24,padding:"44px 40px",width:400,boxShadow:"0 25px 60px rgba(0,0,0,0.35)"}}>

        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:56,height:56,background:"#0f172a",borderRadius:16,display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:16}}>
            <span style={{fontSize:28}}>🎯</span>
          </div>
          <h1 style={{fontSize:22,fontWeight:800,color:"#0f172a",letterSpacing:"-0.02em"}}>Campanha do Mês</h1>
          <p style={{fontSize:13,color:"#94a3b8",marginTop:4}}>Acesso exclusivo por assessor</p>
        </div>

        {/* Campos */}
        <div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>Código do Assessor</label>
          <input
            type="text" placeholder="Ex: 69567"
            value={codigo} onChange={e=>{setCodigo(e.target.value);setErro("");}}
            onKeyDown={e=>e.key==="Enter"&&entrar()}
            style={{width:"100%",padding:"12px 14px",border:"1px solid #e2e8f0",borderRadius:10,fontSize:14,boxSizing:"border-box",outline:"none",transition:"border 0.15s"}}
            onFocus={e=>e.target.style.borderColor="#2563eb"}
            onBlur={e=>e.target.style.borderColor="#e2e8f0"}
          />
        </div>
        <div style={{marginBottom:8}}>
          <label style={{display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>Senha</label>
          <div style={{position:"relative"}}>
            <input
              type={showSenha?"text":"password"} placeholder="Digite sua senha"
              value={senha} onChange={e=>{setSenha(e.target.value);setErro("");}}
              onKeyDown={e=>e.key==="Enter"&&entrar()}
              style={{width:"100%",padding:"12px 44px 12px 14px",border:"1px solid #e2e8f0",borderRadius:10,fontSize:14,boxSizing:"border-box",outline:"none",transition:"border 0.15s"}}
              onFocus={e=>e.target.style.borderColor="#2563eb"}
              onBlur={e=>e.target.style.borderColor="#e2e8f0"}
            />
            <button onClick={()=>setShowSenha(!showSenha)}
              style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#94a3b8",padding:0}}>
              {showSenha?"🙈":"👁"}
            </button>
          </div>
        </div>

        {/* Erro */}
        {erro && (
          <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#dc2626",fontWeight:600}}>
            ⚠️ {erro}
          </div>
        )}

        <button onClick={entrar}
          style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:"#0f172a",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",marginTop:8,transition:"background 0.15s"}}
          onMouseEnter={e=>e.target.style.background="#1e293b"}
          onMouseLeave={e=>e.target.style.background="#0f172a"}>
          Entrar →
        </button>

        <p style={{textAlign:"center",fontSize:11,color:"#cbd5e1",marginTop:20}}>
          Seus dados são salvos exclusivamente para o seu código de acesso
        </p>
      </div>
    </div>
  );
}

const fBRL = (v, compact = false) => {
  if (compact && Math.abs(v) >= 1_000_000) return `R$ ${(v/1_000_000).toFixed(1)}M`;
  if (compact && Math.abs(v) >= 1_000)     return `R$ ${(v/1_000).toFixed(1)}k`;

};
